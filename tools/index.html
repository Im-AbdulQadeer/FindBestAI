<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS — TOOLS DIRECTORY
══════════════════════════════════════════ */
:root {
  --bg-main:        #0A0A0A;
  --bg-card:        #141414;
  --bg-card-hover:  #1A1A1A;
  --text-primary:   #FFFFFF;
  --text-secondary: #A1A1AA;
  --accent-color:   #3B82F6;
  --accent-end:     #8B5CF6;
  --border-color:   rgba(255,255,255,0.08);
  --border-hover:   rgba(255,255,255,0.20);
  --transition-smooth: all 0.3s cubic-bezier(0.4,0,0.2,1);
  --card-radius:    16px;
  --badge-radius:   4px;
}

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
.tools-directory {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 1.5rem 5rem;
}

/* ══════════════════════════════════════════
   HERO
══════════════════════════════════════════ */
.directory-hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  max-width: 800px;
  margin: 0 auto;
  padding: 4.5rem 1rem 3rem;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(59,130,246,0.12);
  border: 1px solid rgba(59,130,246,0.25);
  border-radius: 9999px;
  padding: 0.35rem 1rem;
  font-size: 0.8rem;
  font-weight: 600;
  color: #93C5FD;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
  animation: fadeSlideUp 0.6s cubic-bezier(0.4,0,0.2,1) both;
}

.hero-eyebrow::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #3B82F6;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}

.directory-hero h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  line-height: 1.08;
  letter-spacing: -0.04em;
  background: linear-gradient(135deg, #FFFFFF 0%, #E0E7FF 40%, #93C5FD 70%, #A78BFA 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 1.25rem;
  animation: fadeSlideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.1s both;
}

.directory-hero p {
  color: var(--text-secondary);
  font-size: 1.125rem;
  line-height: 1.65;
  max-width: 580px;
  margin-bottom: 2.5rem;
  animation: fadeSlideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.2s both;
}

.hero-stats {
  display: flex;
  align-items: center;
  gap: 2rem;
  margin-bottom: 2.5rem;
  animation: fadeSlideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.3s both;
}

.hero-stat { text-align: center; }
.hero-stat-num {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}
.hero-stat-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
  font-weight: 500;
  margin-top: 2px;
}
.hero-stat-divider {
  width: 1px;
  height: 32px;
  background: var(--border-color);
}

/* ── Category Pills ── */
.category-pills-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 0.625rem;
  justify-content: center;
  animation: fadeSlideUp 0.7s cubic-bezier(0.4,0,0.2,1) 0.4s both;
}

.cat-pill {
  display: inline-flex;
  align-items: center;
  gap: 0.45rem;
  border-radius: 9999px;
  padding: 0.45rem 1.1rem;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-color);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition-smooth);
  white-space: nowrap;
  user-select: none;
  font-family: 'Outfit', sans-serif;
}

.cat-pill:hover {
  background: rgba(255,255,255,0.09);
  border-color: var(--accent-color);
  color: var(--text-primary);
}

.cat-pill:hover .pill-arrow { transform: translateX(3px); }

.cat-pill .pill-icon { font-size: 0.9rem; }
.cat-pill .pill-count {
  background: rgba(255,255,255,0.08);
  border-radius: 9999px;
  padding: 1px 6px;
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-secondary);
}
.cat-pill .pill-arrow {
  font-size: 0.75rem;
  opacity: 0.5;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display: inline-block;
}

/* ══════════════════════════════════════════
   COMMAND CENTER — SEARCH
══════════════════════════════════════════ */
.command-center {
  position: sticky;
  top: 64px;
  z-index: 100;
  padding: 1.25rem 0 1.5rem;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(12px) saturate(160%);
  -webkit-backdrop-filter: blur(12px) saturate(160%);
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 3rem;
}

.search-wrapper {
  position: relative;
  max-width: 600px;
  margin: 0 auto;
}

.search-icon-left {
  position: absolute;
  left: 1.1rem;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  pointer-events: none;
  display: flex;
  align-items: center;
}

.search-input {
  width: 100%;
  height: 56px;
  padding: 0 3rem 0 3.25rem;
  border-radius: 12px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 1rem;
  font-family: 'Outfit', sans-serif;
  outline: none;
  transition: var(--transition-smooth);
}

.search-input::placeholder { color: var(--text-secondary); }

.search-input:focus {
  border-color: var(--accent-color);
  box-shadow: 0 0 0 2px rgba(59,130,246,0.22);
  background: var(--bg-card-hover);
}

.search-clear {
  position: absolute;
  right: 0.85rem;
  top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: var(--transition-smooth);
  font-size: 0.85rem;
  font-family: 'Outfit', sans-serif;
}

.search-clear.visible { opacity: 1; pointer-events: all; }
.search-clear:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }

.filter-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  margin-top: 1rem;
  flex-wrap: wrap;
}

.filter-chip {
  padding: 0.3rem 0.85rem;
  border-radius: 9999px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.78rem;
  font-weight: 500;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: var(--transition-smooth);
}

.filter-chip:hover,
.filter-chip.active {
  border-color: var(--accent-color);
  background: rgba(59,130,246,0.1);
  color: #93C5FD;
}

/* ══════════════════════════════════════════
   NETFLIX ROW
══════════════════════════════════════════ */
.netflix-row { margin-bottom: 3.5rem; }

.row-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
}

.row-header h2 {
  font-size: 1.375rem;
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--text-primary);
}

.row-view-all {
  font-size: 0.875rem;
  color: var(--text-secondary);
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 0.2s;
  white-space: nowrap;
  padding: 0.35rem 0.75rem;
  border-radius: 6px;
  transition: var(--transition-smooth);
}

.row-view-all:hover {
  color: var(--text-primary);
  border-color: var(--border-color);
  background: rgba(255,255,255,0.04);
}

.netflix-cards-track {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.25rem;
}

/* ══════════════════════════════════════════
   SEARCH GRID
══════════════════════════════════════════ */
#search-grid-layout { display: none; }
#search-grid-layout.visible { display: block; }

.search-results-header { margin-bottom: 1.75rem; }

.search-results-header h2 {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.025em;
}

.search-results-header h2 span {
  background: linear-gradient(135deg, var(--accent-color), var(--accent-end));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.search-results-header p {
  color: var(--text-secondary);
  font-size: 0.875rem;
  margin-top: 0.35rem;
}

.search-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-secondary);
}
.empty-state-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.5; }
.empty-state h3 { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }

/* ══════════════════════════════════════════
   TOOL CARD
══════════════════════════════════════════ */
.tool-card {
  display: flex;
  flex-direction: column;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--card-radius);
  overflow: hidden;
  position: relative;
  transition: var(--transition-smooth);
  cursor: pointer;
  animation: fadeSlideUp 0.5s cubic-bezier(0.4,0,0.2,1) both;
}

.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px -10px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.05);
  border-color: var(--border-hover);
  background: var(--bg-card-hover);
}

.tool-card:hover .card-thumb-bg { transform: scale(1.05); }

/* Thumbnail */
.card-image-wrapper {
  height: 180px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.card-image-wrapper::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
}

.card-thumb-bg {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.5rem;
  position: relative;
  overflow: hidden;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
}

.card-thumb-bg::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 60%);
}

/* Badges */
.badge-category {
  position: absolute;
  top: 0.75rem;
  left: 0.75rem;
  z-index: 2;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--badge-radius);
  padding: 3px 8px;
  font-size: 0.7rem;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

.badge-pricing {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 2;
  border-radius: var(--badge-radius);
  padding: 3px 8px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.badge-pricing.free     { background: rgba(52,211,153,0.2);  color: #6EE7B7; border: 1px solid rgba(52,211,153,0.3); }
.badge-pricing.freemium { background: rgba(59,130,246,0.2);  color: #93C5FD; border: 1px solid rgba(59,130,246,0.3); }
.badge-pricing.paid     { background: rgba(251,191,36,0.2);  color: #FCD34D; border: 1px solid rgba(251,191,36,0.3); }

.card-special-badge {
  position: absolute;
  top: 0.75rem;
  right: 0.75rem;
  z-index: 3;
  padding: 3px 8px;
  border-radius: var(--badge-radius);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.card-special-badge.popular { background: rgba(59,130,246,0.25); color: #93C5FD; border: 1px solid rgba(59,130,246,0.4); }
.card-special-badge.best    { background: rgba(251,191,36,0.25);  color: #FCD34D; border: 1px solid rgba(251,191,36,0.4); }
.card-special-badge.hot     { background: rgba(248,113,113,0.25); color: #FCA5A5; border: 1px solid rgba(248,113,113,0.4); }
.card-special-badge.new     { background: rgba(167,139,250,0.25); color: #C4B5FD; border: 1px solid rgba(167,139,250,0.4); }
.card-special-badge.open    { background: rgba(52,211,153,0.25);  color: #6EE7B7; border: 1px solid rgba(52,211,153,0.4); }

/* Card body */
.card-content {
  padding: 1.1rem 1.25rem 0.75rem;
  flex-grow: 1;
  display: flex;
  flex-direction: column;
}

.card-meta-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin-bottom: 0.6rem;
}

.card-logo {
  width: 28px; height: 28px;
  border-radius: 6px;
  object-fit: contain;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}

.card-logo-fallback {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
}

.card-rating {
  font-size: 0.72rem;
  font-weight: 600;
  color: #FCD34D;
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: auto;
}

.card-reviews {
  font-size: 0.68rem;
  color: var(--text-secondary);
}

.card-content h3 {
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text-primary);
  margin-bottom: 0.45rem;
  line-height: 1.3;
}

.card-desc {
  color: var(--text-secondary);
  font-size: 0.835rem;
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 0.875rem;
  flex-grow: 1;
}

/* Value Index */
.value-index-wrapper { margin-top: auto; }

.value-index-label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.72rem;
  margin-bottom: 4px;
}

.value-index-label { color: var(--text-secondary); font-weight: 500; letter-spacing: 0.02em; }
.value-index-pct   { font-weight: 700; color: var(--text-primary); font-family: 'JetBrains Mono', monospace; }

.value-index-track {
  height: 5px;
  border-radius: 99px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}

.value-index-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent-color), var(--accent-end));
  width: 0%;
  transition: width 1.1s cubic-bezier(0.4,0,0.2,1);
}

/* Card footer */
.card-footer { padding: 0 1.25rem 1.1rem; }

.card-cta {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 0.7rem 1rem;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-secondary);
  cursor: pointer;
  transition: var(--transition-smooth);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
}

.card-cta:hover {
  background: var(--text-primary);
  color: var(--bg-main);
  border-color: var(--text-primary);
}

.card-cta .cta-arrow { display: inline-block; transition: transform 0.2s; }
.card-cta:hover .cta-arrow { transform: translateX(3px); }

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 1100px) {
  .netflix-cards-track { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 768px) {
  .tools-directory   { padding: 0 1rem 4rem; }
  .directory-hero    { padding: 3rem 0 2rem; }
  .command-center    { top: 60px; }
  .row-header h2     { font-size: 1.15rem; }

  .netflix-cards-track {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    gap: 0.875rem;
    padding-bottom: 0.75rem;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .netflix-cards-track::-webkit-scrollbar { display: none; }
  .netflix-cards-track .tool-card {
    scroll-snap-align: start;
    min-width: 82vw;
    max-width: 82vw;
    flex-shrink: 0;
  }

  .search-grid { grid-template-columns: 1fr; }
  .hero-stats  { gap: 1.25rem; }
}

@media (max-width: 480px) {
  .directory-hero h1 { letter-spacing: -0.03em; }
  .hero-stats { flex-wrap: wrap; justify-content: center; }
  .hero-stat-divider { display: none; }
}

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
.hidden { display: none !important; }

.tool-card:nth-child(1) { animation-delay: 0.00s; }
.tool-card:nth-child(2) { animation-delay: 0.05s; }
.tool-card:nth-child(3) { animation-delay: 0.10s; }
.tool-card:nth-child(4) { animation-delay: 0.15s; }
</style>
</head>

<body>
<div class="bg-grid"></div>
<div class="bg-orb orb-a"></div>

<div class="bg-orb orb-c"></div>

<script src="/assets/js/data.js"></script>

<script>
/* ══════════════════════════════════
   THEME BOOTSTRAP
══════════════════════════════════ */
const savedTheme = localStorage.getItem('theme') || 'dark';
document.documentElement.setAttribute('data-theme', savedTheme);
const isDark = savedTheme === 'dark';
function toggleTheme(){
  const c = document.documentElement.getAttribute('data-theme');
  const n = c === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('theme', n);
}

/* ══════════════════════════════════
   CONSTANTS
══════════════════════════════════ */
const ROWS_PER_CAT = 4;
const PLACEHOLDERS = [
  'Search "ChatGPT alternatives"…',
  'Search "free video editor"…',
  'Search "AI for coding"…',
  'Search "image generation"…',
  'Search "music generator"…',
];

const ICON_MAP = {
  'AI Assistants':'🧠','Image Generation':'🎨','Code Assistant':'💻',
  'Video Editing':'🎬','Writing & Copy':'✍️','Research':'🔬',
  'Voice & Speech':'🎙️','Audio & Music':'🎵','Graphic Design':'🎭',
  'Automation':'🔗','Data Analysis':'📊','PDF & Docs':'📄',
  'Notes & PKM':'📝','SEO & Marketing':'🌐','Chatbots':'🤖',
  'Photo Editing':'📸','Video Avatars':'📹','Productivity':'⚡','3D & AR':'🧊',
};

const ROW_ORDER = [
  'AI Assistants','Image Generation','Code Assistant','Video Editing',
  'Writing & Copy','Research','Voice & Speech','Audio & Music',
  'Graphic Design','Automation','Data Analysis','PDF & Docs',
  'Notes & PKM','SEO & Marketing','Chatbots','Photo Editing',
  'Video Avatars','Productivity','3D & AR',
];

/* ══════════════════════════════════
   VALUE INDEX
══════════════════════════════════ */
function calcValueIndex(tool){
  const rScore = (tool.rating / 5) * 100;
  const reviewCount = parseFloat((tool.reviews+'').replace(/[^0-9.]/g,'')) || 1;
  const rReviews = Math.min(100,(Math.log10(reviewCount)/Math.log10(100000))*100);
  const bonus = {best:8,popular:5,hot:6,new:3,open:2}[tool.badge]||0;
  return Math.min(99, Math.round(rScore*0.6 + rReviews*0.4 + bonus));
}

/* ══════════════════════════════════
   LOGO URL
══════════════════════════════════ */
function logoUrl(domain){
  return 'https://img.logo.dev/'+domain+'?token=pk_tcYEBIjLRSWmHHMp2MXKBQ&size=64';
}

/* ══════════════════════════════════
   SLUG (for tool URLs)
══════════════════════════════════ */
function slug(name){
  return name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

/* ══════════════════════════════════
   BUILD CARD HTML
══════════════════════════════════ */
function buildCard(tool, idx){
  idx = idx || 0;
  const vi = calcValueIndex(tool);
  const url = '/tool/'+slug(tool.name)+'/';
  const hasSpecial = tool.badge && ['popular','best','hot','new','open'].includes(tool.badge);
  const pricingLabel = {free:'Free',freemium:'Freemium',paid:'Paid'}[tool.pricing]||tool.pricing;
  const badgeLabel   = {popular:'Popular',best:'Best',hot:'🔥 Hot',new:'New',open:'Open'}[tool.badge]||tool.badge;

  return `
<article class="tool-card" data-id="${tool.id}" data-cat="${tool.cat}" data-pricing="${tool.pricing}" data-badge="${tool.badge||''}"
  style="animation-delay:${idx*0.05}s" onclick="window.location.href='${url}'" role="article" aria-label="${tool.name}">
  <div class="card-image-wrapper">
    <div class="card-thumb-bg" style="background:${tool.bg};">${tool.emoji}</div>
    <span class="badge-category">${tool.cat}</span>
    ${hasSpecial
      ? `<span class="card-special-badge ${tool.badge}">${badgeLabel}</span>`
      : `<span class="badge-pricing ${tool.pricing}">${pricingLabel}</span>`
    }
  </div>
  <div class="card-content">
    <div class="card-meta-row">
      <img class="card-logo" src="${logoUrl(tool.logo)}" alt="${tool.name} logo"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="card-logo-fallback">${tool.emoji}</span>
      <span class="card-rating">&#9733; ${tool.rating}</span>
      <span class="card-reviews">(${tool.reviews})</span>
    </div>
    <h3>${tool.name}</h3>
    <p class="card-desc">${tool.desc}</p>
    <div class="value-index-wrapper">
      <div class="value-index-label-row">
        <span class="value-index-label">Value Index</span>
        <span class="value-index-pct">${vi}%</span>
      </div>
      <div class="value-index-track">
        <div class="value-index-fill" data-width="${vi}"></div>
      </div>
    </div>
  </div>
  <div class="card-footer">
    <button class="card-cta" onclick="event.stopPropagation();window.location.href='${url}'">
      Read Complete Overview <span class="cta-arrow">&#8594;</span>
    </button>
  </div>
</article>`.trim();
}

/* ══════════════════════════════════
   NETFLIX LAYOUT
══════════════════════════════════ */
function buildNetflixLayout(){
  const el = document.getElementById('netflix-layout');
  let html = '';
  ROW_ORDER.forEach(catName => {
    const catTools = TOOLS.filter(t => t.cat === catName);
    if(!catTools.length) return;
    const cat = CATS.find(c=>c.name===catName);
    const total = cat ? cat.count : catTools.length;
    const display = catTools.slice(0, ROWS_PER_CAT);
    const icon = ICON_MAP[catName]||'🤖';
    html += `
<div class="netflix-row" id="row-${catName.replace(/\s+/g,'-').toLowerCase()}">
  <div class="row-header">
    <h2>${icon} ${catName}</h2>
    <button class="row-view-all" onclick="filterByCategory('${catName}')">View All ${catName} (${total}) &#8594;</button>
  </div>
  <div class="netflix-cards-track">
    ${display.map((t,i)=>buildCard(t,i)).join('')}
  </div>
</div>`;
  });
  el.innerHTML = html;
  initObserver();
}

/* ══════════════════════════════════
   CATEGORY PILLS
══════════════════════════════════ */
function buildPills(){
  document.getElementById('cat-pills').innerHTML = CATS.map(c=>`
<button class="cat-pill" onclick="filterByCategory('${c.name}')">
  <span class="pill-icon">${c.icon}</span>${c.name}
  <span class="pill-count">${c.count}</span>
  <span class="pill-arrow">&#8594;</span>
</button>`).join('');
}

/* ══════════════════════════════════
   SEARCH STATE
══════════════════════════════════ */
let activeFilter = 'all';

function getResults(q, filter){
  let tools = TOOLS;
  if(q){
    const lq = q.toLowerCase();
    tools = tools.filter(t =>
      t.name.toLowerCase().includes(lq)||
      t.desc.toLowerCase().includes(lq)||
      t.cat.toLowerCase().includes(lq)||
      (t.tags&&t.tags.some(g=>g.toLowerCase().includes(lq)))
    );
  }
  if(filter && filter!=='all'){
    if(filter==='popular') tools = tools.filter(t=>['popular','best','hot'].includes(t.badge));
    else if(filter==='open') tools = tools.filter(t=>t.badge==='open'||t.pricing==='free');
    else tools = tools.filter(t=>t.pricing===filter);
  }
  return tools;
}

function showSearch(q, filter){
  document.getElementById('netflix-layout').classList.add('hidden');
  const sg = document.getElementById('search-grid-layout');
  sg.classList.add('visible');
  const results = getResults(q, filter);
  document.getElementById('search-query-display').textContent = q ? '"'+q+'"' : (filter!=='all'?filter:'all tools');
  document.getElementById('search-count-display').textContent = results.length+' tool'+(results.length!==1?'s':'')+' found';
  const grid = document.getElementById('search-grid');
  if(!results.length){
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128269;</div><h3>No tools found</h3><p>Try a different search term or browse by category above.</p></div>';
  } else {
    grid.innerHTML = results.map((t,i)=>buildCard(t,i)).join('');
    initObserver();
  }
}

function showNetflix(){
  document.getElementById('netflix-layout').classList.remove('hidden');
  const sg = document.getElementById('search-grid-layout');
  sg.classList.remove('visible');
}

function filterByCategory(name){
  document.getElementById('search-input').value = '';
  activeFilter = 'all';
  updateChips('all');
  setClear(false);
  showSearch(name,'all');
  document.getElementById('search-query-display').textContent = '"'+name+'"';
  document.querySelector('.command-center').scrollIntoView({behavior:'smooth',block:'start'});
}

/* ══════════════════════════════════
   SEARCH EVENTS
══════════════════════════════════ */
function setClear(show){
  document.getElementById('search-clear').classList.toggle('visible',show);
}

function updateChips(f){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===f));
}

document.getElementById('search-input').addEventListener('input',function(){
  setClear(this.value.length>0);
  if(this.value.trim()){
    showSearch(this.value.trim(),activeFilter);
  } else {
    activeFilter==='all' ? showNetflix() : showSearch('',activeFilter);
  }
});

document.getElementById('search-clear').addEventListener('click',function(){
  const inp = document.getElementById('search-input');
  inp.value=''; setClear(false);
  activeFilter='all'; updateChips('all');
  showNetflix(); inp.focus();
});

document.getElementById('filter-bar').addEventListener('click',function(e){
  const chip = e.target.closest('.filter-chip');
  if(!chip) return;
  activeFilter = chip.dataset.filter;
  updateChips(activeFilter);
  const q = document.getElementById('search-input').value.trim();
  (activeFilter==='all'&&!q) ? showNetflix() : showSearch(q,activeFilter);
});

/* ══════════════════════════════════
   PLACEHOLDER TYPING EFFECT
══════════════════════════════════ */
function typingEffect(){
  const inp = document.getElementById('search-input');
  let si=0,ci=0,del=false;
  function tick(){
    if(document.activeElement===inp){setTimeout(tick,150);return;}
    const cur = PLACEHOLDERS[si];
    if(!del){ inp.placeholder=cur.slice(0,ci+1); ci++;
      if(ci===cur.length){del=true;setTimeout(tick,1800);return;}
    } else { inp.placeholder=cur.slice(0,ci-1); ci--;
      if(ci===0){del=false;si=(si+1)%PLACEHOLDERS.length;}
    }
    setTimeout(tick,del?50:80);
  }
  setTimeout(tick,2000);
}

/* ══════════════════════════════════
   INTERSECTION OBSERVER
══════════════════════════════════ */
function initObserver(){
  const fills = document.querySelectorAll('.value-index-fill:not([data-obs])');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        const f=e.target;
        requestAnimationFrame(()=>{ f.style.width=f.getAttribute('data-width')+'%'; });
        f.setAttribute('data-obs','1');
        obs.unobserve(f);
      }
    });
  },{threshold:0.15,rootMargin:'0px 0px -40px 0px'});
  fills.forEach(f=>obs.observe(f));
}

/* ══════════════════════════════════
   URL PARAMS
══════════════════════════════════ */
function handleParams(){
  const p = new URLSearchParams(window.location.search);
  const q = p.get('q'), cat = p.get('cat');
  if(q){
    document.getElementById('search-input').value=q;
    setClear(true); showSearch(q,activeFilter);
  } else if(cat){
    filterByCategory(decodeURIComponent(cat));
  }
}

/* ══════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════ */
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){
    e.preventDefault();
    const i=document.getElementById('search-input');
    i.focus(); i.select();
  }
  if(e.key==='Escape'){
    const i=document.getElementById('search-input');
    if(i.value){
      i.value=''; setClear(false);
      activeFilter='all'; updateChips('all'); showNetflix();
    }
  }
});

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
document.addEventListener('DOMContentLoaded',function(){
  buildPills();
  buildNetflixLayout();
  typingEffect();
  handleParams();
});
</script>
