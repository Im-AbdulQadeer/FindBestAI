<!-- PAGE HERO -->

  <div class="page-badge">// AI TOOLS DIRECTORY</div>
  <h1 style="font-size:clamp(2rem,4vw,3.2rem);font-weight:900;letter-spacing:-0.04em;color:var(--text);margin-bottom:12px">All <em style="font-style:normal;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">AI Tools</em></h1>

<!-- FILTERS -->
<section class="section" style="padding-bottom:0">
  <div class="cats-wrap" id="toolsCats" role="list" aria-label="Category filters" style="margin-bottom:20px"></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:32px;align-items:center">

  </div>

<script src="/assets/js/data.js" defer></script>
<script src="/assets/js/app.js" defer></script>
<script src="/assets/js/nav.js" defer></script>
<script>
/* ── TOOLS PAGE ── */
let activeCat = '';
let allToolsRendered = false;

function renderAllTools(){
  const grid = document.getElementById('toolsPageGrid');
  if(allToolsRendered) return;
  TOOLS.forEach(t => grid.appendChild(makeCard(t)));
  allToolsRendered = true;
  updateToolsCount();
}

function filterTools(){
  const q = (document.getElementById('toolsSearch')?.value || '').toLowerCase().trim();
  const pricing = document.getElementById('toolsPricing')?.value || '';
  const cards = document.querySelectorAll('#toolsPageGrid .card');
  let visible = 0;
  cards.forEach(card => {
    const id = parseInt(card.querySelector('.card-btn')?.getAttribute('onclick')?.match(/\d+/)?.[0]);
    const t = TOOLS.find(x=>x.id===id);
    if(!t){ card.style.display=''; return; }
    const matchCat = !activeCat || t.cat === activeCat;
    const matchQ = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.cat.toLowerCase().includes(q);
    const matchPrice = !pricing || t.pricing === pricing;
    const show = matchCat && matchQ && matchPrice;
    card.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  document.getElementById('noToolsMsg').style.display = visible === 0 ? 'block' : 'none';
  updateToolsCount(visible);
}

function updateToolsCount(count){
  const el = document.getElementById('toolsCount');
  if(el) el.textContent = (count !== undefined ? count : TOOLS.length) + ' tools';
}

(function(){
  const params = new URLSearchParams(window.location.search);
  const urlCat = params.get('cat');
  const urlPricing = params.get('pricing');
  if(urlCat) activeCat = urlCat;

  renderCats('toolsCats', cat => {
    activeCat = activeCat === cat.name ? '' : cat.name;
    filterTools();
  });

  /* Pre-fill pricing filter from URL */
  if(urlPricing){
    const pricingSel = document.getElementById('toolsPricing');
    if(pricingSel) pricingSel.value = urlPricing;
  }

  renderAllTools();

  if(activeCat || urlPricing) filterTools();

  initCommonUI();
})();
</script>
